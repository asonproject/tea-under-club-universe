<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Markdown to reveal.js Presenter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/theme/black.min.css" id="theme">
    <style>
        /* 入力画面のスタイル */
        #input-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #222; color: #fff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }
        textarea {
            width: 80%; height: 60%; margin-bottom: 20px;
            background: #333; color: #fff; border: 1px solid #555; padding: 10px; font-family: monospace;
        }
        button {
            padding: 10px 20px; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="input-container">
        <h2>Markdown スライド生成器</h2>
        <p>Markdownテキスト（Marp形式など）を貼り付けてください。※「marp: true」などは自動で無視されます。</p>
        <textarea id="markdown-input" placeholder="---&#10;# スライド1&#10;中身&#10;---&#10;# スライド2&#10;中身"></textarea>
        <button onclick="startPresentation()">スライドを開始する</button>
    </div>

    <div class="reveal">
        <div class="slides">
            <section id="slide-content" data-markdown data-separator="^\n---\n$" data-separator-vertical="^\n--\n$">
                </section>
        </div>
    </div>

    <script href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.js"></script>
    <script href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/plugin/markdown/markdown.min.js"></script>

    <script>
        function startPresentation() {
            let rawMarkdown = document.getElementById('markdown-input').value;

            // 【ポイント】Marp特有のFront Matter（--- marp: true --- など）を簡易的に除去
            // 先頭の --- から 次の --- までの設定部分を消去、または空行に置換
            let cleanMarkdown = rawMarkdown.replace(/^---[\s\S]*?---/, '');

            // 変換後のMarkdownをscriptタグ内に注入
            const slideContent = document.getElementById('slide-content');
            
            // reveal.jsのMarkdownプラグインが読み込めるようにscriptタグで包む
            slideContent.innerHTML = `<script type="text/template">${cleanMarkdown}<\/script>`;

            // 入力画面を非表示にする
            document.getElementById('input-container').style.display = 'none';

            // reveal.js を初期化して起動
            Reveal.initialize({
                plugins: [ RevealMarkdown ]
            });
        }
    </script>
</body>
</html>
