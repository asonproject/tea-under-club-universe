<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>計画表アプリ</title>
  <style>
    /* 基本レイアウト：PCで広がるように修正 */
    .app {
      max-width: 900px; /* PC用拡大 */
      margin: 0 auto;
      padding: 18px;
    }
    
    /* 印刷時の改行保持 */
    @media print {
      .print-row, .weekly-print-cell {
        white-space: pre-wrap !important;
      }
    }

    /* 週間計画表モーダル用スタイル */
    .day-card {
      background: #fffdf5;
      border: 1.5px solid #1e2a44;
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      border-radius: 8px;
    }
    .day-card:hover { background: #f0ebdd; }
    
    /* モーダル表示 */
    #editModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal-content { background: #faf6ed; margin: 10% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 10px; }
    .input-group { margin-bottom: 15px; }
    textarea { width: 100%; height: 80px; }
  </style>
</head>
<body>

<div class="app">
  <div id="weeklyContainer" class="weekly-planner">
    <div class="day-card" onclick="openModal('月')"><h3>月曜日</h3><p>タップして詳細を入力</p></div>
    <div class="day-card" onclick="openModal('火')"><h3>火曜日</h3><p>タップして詳細を入力</p></div>
    </div>

  <button class="tool-btn print" onclick="window.print()">印刷する</button>
</div>

<div id="editModal">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <div class="input-group">
      <label>朝</label><textarea id="inputMorning"></textarea>
    </div>
    <div class="input-group">
      <label>昼</label><textarea id="inputLunch"></textarea>
    </div>
    <div class="input-group">
      <label>晩</label><textarea id="inputDinner"></textarea>
    </div>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
  // ESCキーで戻る機能
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeModal();
      // プレビューモードならプレビューを閉じるロジックもここに追加可能
    }
  });

  function openModal(day) {
    document.getElementById('modalTitle').innerText = day + '曜日の計画';
    document.getElementById('editModal').style.display = 'block';
  }

  function closeModal() {
    document.getElementById('editModal').style.display = 'none';
  }
</script>

</body>
</html>
